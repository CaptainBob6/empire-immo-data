name: Synchronisation des données Empire Immo

on:
  schedule:
    - cron: "0 */3 * * *"   # toutes les 3h, UTC
  workflow_dispatch: {}      # déclenchement manuel possible depuis l'onglet Actions

permissions:
  contents: write

concurrency:
  group: empire-immo-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r scripts/requirements.txt

      - name: Récupérer les données (tous les mondes de config/worlds.json)
        run: python scripts/fetch_data.py

      - name: Commit et push si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history/
          if git diff --staged --quiet; then
            echo "Rien de nouveau à committer."
            exit 0
          fi
          git commit -m "data: sync $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push réussi (tentative $attempt)."
              exit 0
            fi
            echo "Échec du push (tentative $attempt/5), nouvelle tentative dans 15s..."
            sleep 15
            git pull --rebase --quiet || true
          done
          echo "Push toujours en échec après 5 tentatives. Ce relevé sera perdu (le job va se terminer),"
          echo "mais le prochain run programmé (dans au plus 3h) fera un nouveau relevé à jour."
          exit 1
